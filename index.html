<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tafel Ninja v79</title>
<style>
body{font-family:Arial;background:#5b25b5;margin:0}
.card{background:white;border-radius:24px;padding:20px;margin:20px}
.row{display:flex;gap:15px;align-items:center;padding:18px 0;border-bottom:1px solid #eee}
.icon{width:50px;height:50px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:26px;color:white}
.red{background:#ef476f}
.green{background:#11a86b}
.blue{background:#3a86ff}
h2{margin:0;font-size:22px}
p{margin:4px 0 0;color:#555}
</style>
</head>
<body>

<div class="card">
  <h2>Behoud of verhoog je status</h2>
  <p>Speel wekelijks 1 wedstrijd.</p>
  <p>Oefen daarnaast 3 losse tafels.</p>
</div>

<div class="card">
  <div class="row">
    <div class="icon red">✕</div>
    <div>
      <h2>Lukt het niet?</h2>
      <p>Dan zak je 1 level omlaag.</p>
    </div>
  </div>

  <div class="row">
    <div class="icon green">✓</div>
    <div>
      <h2>Lukt het wel?</h2>
      <p>Dan behoud je je status.</p>
    </div>
  </div>

  <div class="row" style="border-bottom:0">
    <div class="icon blue">📈</div>
    <div>
      <h2>Haal je een hoger level?</h2>
      <p>Dan ga je in status omhoog.</p>
    </div>
  </div>
</div>

</body>
</html>
